<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mon Jeu TCG</title>
        <style>
            /* --- RESET & THEME NEUTRE --- */
            body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #1e272e; color: #d2dae2; overflow: hidden; }
            h2, h3 { margin-top: 0; color: #ecf0f1; text-align: center; }

            /* --- ECRAN DE LOGIN --- */
            #auth-container { height: 100%; display: flex; align-items: center; justify-content: center; }
            #auth-card { background: #2d3436; padding: 30px; border-radius: 8px; width: 100%; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
            #auth-card input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #636e72; border-radius: 4px; background: #1e272e; color: white; }
            #auth-card button { width: 100%; padding: 12px; background: #636e72; color: #f5f6fa; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
            #error-msg { color: #ff7675; font-size: 0.9em; }
            #toggle-link { color: #b2bec3; cursor: pointer; font-size: 0.9em; text-decoration: underline; margin-top: 15px; display: inline-block;}

            /* --- STRUCTURE DU JEU (SLIDER CLASH ROYALE) --- */
            #game-container { display: none; flex-direction: column; height: 100%; }

            /* Barre du haut */
            .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #2d3436; height: 50px; border-bottom: 2px solid #1e272e; }
            .top-bar button { background: #d63031; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }

            /* Zone de glissement (Slider) */
            .viewport { flex: 1; overflow: hidden; position: relative; }
            .slider { display: flex; width: 400vw; height: 100%; transition: transform 0.3s ease-in-out; }
            .panel { width: 100vw; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; }

            /* Barre du bas (Navigation) */
            .bottom-nav { display: flex; height: 65px; background: #2d3436; border-top: 2px solid #1e272e; }
            .nav-btn { flex: 1; border: none; background: transparent; color: #636e72; font-weight: bold; font-size: 1em; cursor: pointer; transition: 0.2s; }
            .nav-btn.active { color: #ecf0f1; background: #353b48; border-top: 4px solid #b2bec3; }

            /* --- PANEL 0 : BOOSTER --- */
            .booster-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
            #open-booster-btn { background: #718093; color: white; border: none; padding: 20px 40px; border-radius: 8px; font-size: 1.2em; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #353b48; }
            #open-booster-btn:active { transform: translateY(4px); box-shadow: none; }

            /* --- PANEL 1 : INVENTAIRE --- */
            .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
            .card { background: #353b48; border-radius: 8px; padding: 10px; text-align: center; border: 3px solid #718093; position: relative; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
            .locked { filter: grayscale(100%) brightness(50%); cursor: not-allowed; }
            .lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5em; z-index: 10; }
            .pending { filter: brightness(70%); border-color: #e1b12c !important; box-shadow: 0 0 15px rgba(225, 177, 44, 0.4); }
            .quiz-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5em; z-index: 10; }

            /* --- PANEL 2 : ACCUEIL / COMBAT --- */
            .home-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
            .battle-btn { background: #e1b12c; color: #2d3436; border: none; padding: 25px 80px; font-size: 2em; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #c23616; text-transform: uppercase; }
            .battle-btn:active { transform: translateY(6px); box-shadow: none; }

            /* --- PANEL 3 : SOCIAL / AMIS --- */
            .social-box { background: #353b48; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
            .friend-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
            .friend-input-group input { flex: 1; padding: 10px; border: 1px solid #718093; border-radius: 4px; background: #2d3436; color: white; }
            .friend-input-group button { background: #718093; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;}
            .friend-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #2d3436; background: #2f3640; border-radius: 4px; margin-bottom: 5px; }
            .friend-row button { background: #4cd137; border: none; padding: 5px 10px; border-radius: 4px; color: #2d3436; cursor: pointer; font-weight: bold; }
        </style>
    </head>
    <body>
        <div id="app" style="height: 100%;">

            <div id="auth-container">
                <div id="auth-card">
                    <h2 id="form-title">Login</h2>
                    <input type="text" id="username" placeholder="Pseudo" />
                    <input type="password" id="password" placeholder="Mot de passe" />
                    <p id="error-msg"></p>
                    <button id="submit-btn">Connexion</button>
                    <p id="toggle-link">Pas de compte ? S'inscrire</p>
                </div>
            </div>

            <div id="game-container">
                
                <header class="top-bar">
                    <div style="font-weight: bold; color: #b2bec3;">Joueur : <span id="display-username" style="color: white;">...</span></div>
                    <button id="logout-btn">Déconnexion</button>
                </header>

                <div class="viewport">
                    <div class="slider" id="slider">
                        
                        <div class="panel">
                            <div class="booster-center">
                                <h2 style="margin-bottom: 40px;">Boutique & Boosters</h2>
                                <button id="open-booster-btn">Ouvrir un Booster 📦</button>
                            </div>
                        </div>

                        <div class="panel">
                            <h2>Mon Deck</h2>
                            <div id="inventory" class="inventory-grid"></div>
                        </div>

                        <div class="panel">
                            <div class="home-center">
                                <button class="battle-btn">Combattre !</button>
                                <p style="margin-top: 20px; color: #718093;">Bientôt disponible...</p>
                            </div>
                        </div>

                        <div class="panel">
                            <h2>Scoreboard & Amis</h2>
                            <div class="social-box">
                                <h3>Ajouter un ami</h3>
                                <div class="friend-input-group">
                                    <input type="text" id="friend-input" placeholder="Pseudo du joueur">
                                    <button id="add-friend-btn">Ajouter</button>
                                </div>
                            </div>
                            
                            <div class="social-box">
                                <h3>Demandes en attente</h3>
                                <div id="friend-requests-list">Aucune demande</div>
                            </div>

                            <div class="social-box">
                                <h3>Mes Amis</h3>
                                <div id="friends-list">Aucun ami pour le moment</div>
                            </div>
                        </div>

                    </div>
                </div>

                <nav class="bottom-nav">
                    <button class="nav-btn" data-target="0">Boutique</button>
                    <button class="nav-btn" data-target="1">Cartes</button>
                    <button class="nav-btn active" data-target="2">Combat</button>
                    <button class="nav-btn" data-target="3">Social</button>
                </nav>

            </div>

        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
